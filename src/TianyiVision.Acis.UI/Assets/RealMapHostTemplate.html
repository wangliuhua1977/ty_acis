<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACIS Real Map Host</title>
  <style>
    :root {
      color-scheme: dark;
      --stage-bg: #07111f;
      --text: #e8eef9;
      --label-bg: rgba(16, 35, 56, 0.88);
      --state-online: #34d6a2;
      --state-fault: #ff4d4f;
      --state-warning: #c99026;
      --state-neutral: #7f8ea3;
      --selected: #ffffff;
    }

    html,
    body,
    #map {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background: var(--stage-bg);
      overflow: hidden;
      font-family: "Microsoft YaHei UI", sans-serif;
    }

    #map {
      opacity: 0;
      transition: opacity 160ms ease-out;
    }

    body.map-ready #map {
      opacity: 1;
    }

    .marker {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .marker-dot {
      width: 16px;
      height: 16px;
      border-radius: 999px;
      border: 2px solid rgba(255, 255, 255, 0.85);
      background: var(--tone);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.08), 0 10px 18px rgba(0, 0, 0, 0.4);
      pointer-events: auto;
    }

    .marker-label {
      margin-top: 8px;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: var(--label-bg);
      color: var(--text);
      font-size: 12px;
      line-height: 1.2;
      white-space: nowrap;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.24);
      pointer-events: auto;
    }

    .marker.selected .marker-dot {
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.18), 0 0 0 7px rgba(255, 255, 255, 0.10), 0 10px 18px rgba(0, 0, 0, 0.4);
    }

    .marker.selected .marker-label {
      font-weight: 700;
      border-color: rgba(255, 255, 255, 0.26);
    }

    .marker.current .marker-dot,
    .marker.inspecting .marker-dot {
      width: 18px;
      height: 18px;
    }

    .marker.fault .marker-dot {
      animation: fault-blink 1.05s infinite ease-in-out;
    }

    .marker.inspecting .marker-dot,
    .marker.current .marker-dot {
      animation: active-pulse 1.1s infinite ease-in-out;
    }

    @keyframes fault-blink {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.14); opacity: 0.88; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes active-pulse {
      0% { transform: scale(0.96); }
      50% { transform: scale(1.16); }
      100% { transform: scale(0.96); }
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <script>
    const bootConfig = __BOOT_CONFIG__;
    let map = null;
    let mapReady = false;
    let mapReadyPosted = false;
    let renderToken = 0;
    let markerIndex = new Map();
    let lastPointSignature = "";

    function post(type, payload) {
      if (window.chrome && window.chrome.webview) {
        window.chrome.webview.postMessage({ type, payload });
      }
    }

    function logMapRender(message) {
      post("diagnostic", {
        stage: "MapRender",
        message
      });
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function hasFiniteCoordinate(longitude, latitude) {
      return Number.isFinite(longitude)
        && Number.isFinite(latitude)
        && longitude >= -180
        && longitude <= 180
        && latitude >= -90
        && latitude <= 90;
    }

    function normalizeCoordinateValue(value) {
      const numberValue = Number(value);
      return Number.isFinite(numberValue) ? numberValue : null;
    }

    function formatCoordinate(longitude, latitude) {
      if (!hasFiniteCoordinate(longitude, latitude)) {
        return "none";
      }

      return `${longitude.toFixed(6)},${latitude.toFixed(6)}`;
    }

    function resolveLngLat(location) {
      if (!location) {
        return null;
      }

      const longitude = normalizeCoordinateValue(
        typeof location.lng === "number"
          ? location.lng
          : typeof location.getLng === "function"
            ? location.getLng()
            : Array.isArray(location)
              ? location[0]
              : null);
      const latitude = normalizeCoordinateValue(
        typeof location.lat === "number"
          ? location.lat
          : typeof location.getLat === "function"
            ? location.getLat()
            : Array.isArray(location)
              ? location[1]
              : null);

      if (!hasFiniteCoordinate(longitude, latitude)) {
        return null;
      }

      return {
        longitude,
        latitude
      };
    }

    function setTheme(theme) {
      if (!theme) {
        return;
      }

      const root = document.documentElement;
      root.style.setProperty("--stage-bg", theme.stageBackground || "#07111f");
      root.style.setProperty("--text", theme.textPrimary || "#e8eef9");
      root.style.setProperty("--label-bg", theme.labelBackground || "rgba(16, 35, 56, 0.88)");
      root.style.setProperty("--state-online", theme.online || "#34d6a2");
      root.style.setProperty("--state-fault", theme.fault || "#ff4d4f");
      root.style.setProperty("--state-warning", theme.pending || "#c99026");
      root.style.setProperty("--state-neutral", theme.neutral || "#7f8ea3");
      root.style.setProperty("--selected", theme.selected || "#ffffff");
    }

    function toneByCategory(point) {
      switch (point.colorCategory) {
        case "Fault":
          return "var(--state-fault)";
        case "Warning":
          return "var(--state-warning)";
        case "Neutral":
          return "var(--state-neutral)";
        default:
          return "var(--state-online)";
      }
    }

    function markerClass(point) {
      const classes = ["marker", String(point.visualKind || "Normal").toLowerCase()];
      if (point.isSelected) {
        classes.push("selected");
      }
      if (point.isCurrent) {
        classes.push("current");
      }
      return classes.join(" ");
    }

    function buildMarkerContent(point) {
      return `
        <div class="${markerClass(point)}" style="--tone:${toneByCategory(point)};">
          <div class="marker-dot"></div>
          <div class="marker-label">${escapeHtml(point.pointName)}</div>
        </div>`;
    }

    function buildPointSignature(points) {
      return points
        .map(point => `${point.pointId}:${formatCoordinate(point.mapLongitude, point.mapLatitude)}`)
        .join("|");
    }

    function logSampleLines(prefix, points, formatter) {
      for (const point of points.slice(0, 3)) {
        logMapRender(`${prefix} ${formatter(point)}`);
      }
    }

    function fitOrFocus(points, selectedPointId) {
      if (!map) {
        return;
      }

      const selectedMarker = selectedPointId ? markerIndex.get(selectedPointId) : null;
      if (selectedMarker) {
        map.panTo(selectedMarker.getPosition());
        return;
      }

      const visibleMarkers = Array.from(markerIndex.values());
      if (visibleMarkers.length === 0) {
        map.setZoomAndCenter(
          bootConfig.defaultZoom,
          [bootConfig.defaultCenterLongitude, bootConfig.defaultCenterLatitude]);
        return;
      }

      if (visibleMarkers.length === 1) {
        map.setZoomAndCenter(Math.max(bootConfig.defaultZoom, 13), visibleMarkers[0].getPosition());
        return;
      }

      map.setFitView(visibleMarkers, false, [60, 60, 60, 60]);
    }

    function prepareRenderBatches(points) {
      const directRenderablePoints = [];
      const baiduConvertiblePoints = [];
      const skippedPoints = [];

      for (const point of points) {
        const mapLongitude = normalizeCoordinateValue(point.mapLongitude);
        const mapLatitude = normalizeCoordinateValue(point.mapLatitude);
        const rawLongitude = normalizeCoordinateValue(point.rawLongitude);
        const rawLatitude = normalizeCoordinateValue(point.rawLatitude);
        const registeredLongitude = normalizeCoordinateValue(point.registeredLongitude);
        const registeredLatitude = normalizeCoordinateValue(point.registeredLatitude);
        const source = point.mapSource || "unavailable";

        if ((source === "registered_gcj02" || source === "resolved_gcj02") && hasFiniteCoordinate(mapLongitude, mapLatitude)) {
          directRenderablePoints.push({
            ...point,
            mapLongitude,
            mapLatitude,
            rawLongitude,
            rawLatitude,
            registeredLongitude,
            registeredLatitude
          });
          continue;
        }

        if (source === "amap_js_convert_from_baidu" && hasFiniteCoordinate(registeredLongitude, registeredLatitude)) {
          baiduConvertiblePoints.push({
            ...point,
            mapLongitude,
            mapLatitude,
            rawLongitude,
            rawLatitude,
            registeredLongitude,
            registeredLatitude
          });
          continue;
        }

        skippedPoints.push({
          ...point,
          mapLongitude,
          mapLatitude,
          rawLongitude,
          rawLatitude,
          registeredLongitude,
          registeredLatitude
        });
      }

      logMapRender(`directPointCount = ${directRenderablePoints.length}`);
      logMapRender(`baiduConvertPointCount = ${baiduConvertiblePoints.length}`);
      logMapRender(`skippedPointCount = ${skippedPoints.length}`);

      logSampleLines("direct sample =", directRenderablePoints, point =>
        `pointId=${point.pointId}, source=${point.mapSource}, raw=${formatCoordinate(point.registeredLongitude, point.registeredLatitude)}, map=${formatCoordinate(point.mapLongitude, point.mapLatitude)}, finalRenderable=${point.finalRenderable}, colorRuleKey=${point.colorRuleKey}`);
      logSampleLines("baidu sample before =", baiduConvertiblePoints, point =>
        `pointId=${point.pointId}, source=${point.mapSource}, raw=${formatCoordinate(point.registeredLongitude, point.registeredLatitude)}, currentMap=${formatCoordinate(point.mapLongitude, point.mapLatitude)}, finalRenderable=${point.finalRenderable}, colorRuleKey=${point.colorRuleKey}`);
      logSampleLines("skipped sample =", skippedPoints, point =>
        `pointId=${point.pointId}, source=${point.mapSource}, raw=${formatCoordinate(point.registeredLongitude, point.registeredLatitude)}, map=${formatCoordinate(point.mapLongitude, point.mapLatitude)}, status=${point.coordinateStatusText || "none"}, finalRenderable=${point.finalRenderable}, colorRuleKey=${point.colorRuleKey}`);

      return {
        directRenderablePoints,
        baiduConvertiblePoints,
        skippedPoints
      };
    }

    function convertBaiduBatch(points) {
      if (!points || points.length === 0) {
        return Promise.resolve([]);
      }

      return new Promise(resolve => {
        const sourceLocations = points.map(point => [point.registeredLongitude, point.registeredLatitude]);
        try {
          AMap.convertFrom(sourceLocations, "baidu", (status, result) => {
            const locations = result && Array.isArray(result.locations) ? result.locations : [];
            if (status !== "complete" || locations.length === 0) {
              logMapRender(`convertedPointCount = 0`);
              logMapRender(`baidu convert failed = status:${status || "unknown"}, resultInfo:${result && result.info ? result.info : "none"}`);
              resolve([]);
              return;
            }

            const convertedRenderablePoints = [];
            for (let index = 0; index < points.length; index += 1) {
              const point = points[index];
              const resolved = resolveLngLat(locations[index]);
              if (!resolved) {
                continue;
              }

              const convertedPoint = {
                ...point,
                mapLongitude: resolved.longitude,
                mapLatitude: resolved.latitude
              };
              convertedRenderablePoints.push(convertedPoint);

              if (index < 3) {
                logMapRender(
                  `converted sample = pointId=${point.pointId}, source=${point.mapSource}, before=${formatCoordinate(point.registeredLongitude, point.registeredLatitude)}, after=${formatCoordinate(convertedPoint.mapLongitude, convertedPoint.mapLatitude)}, finalRenderable=${point.finalRenderable}, colorRuleKey=${point.colorRuleKey}`);
              }
            }

            logMapRender(`convertedPointCount = ${convertedRenderablePoints.length}`);
            resolve(convertedRenderablePoints);
          });
        } catch (error) {
          logMapRender(`convertedPointCount = 0`);
          logMapRender(`baidu convert exception = ${error && error.message ? error.message : "unknown"}`);
          resolve([]);
        }
      });
    }

    function syncMarkers(points) {
      const incomingIds = new Set(points.map(point => point.pointId));
      for (const [pointId, marker] of markerIndex.entries()) {
        if (!incomingIds.has(pointId)) {
          map.remove(marker);
          markerIndex.delete(pointId);
        }
      }

      let markerCreatedCount = 0;
      for (const point of points) {
        const position = [point.mapLongitude, point.mapLatitude];
        let marker = markerIndex.get(point.pointId);

        if (!marker) {
          marker = new AMap.Marker({
            position,
            anchor: "center",
            title: point.pointName,
            content: buildMarkerContent(point),
            zIndex: point.isCurrent ? 260 : point.isSelected ? 240 : 120
          });
          marker.on("click", () => post("pointSelected", point.pointId));
          marker.setMap(map);
          markerIndex.set(point.pointId, marker);
          markerCreatedCount += 1;
        } else {
          marker.setPosition(position);
          marker.setContent(buildMarkerContent(point));
          marker.setzIndex(point.isCurrent ? 260 : point.isSelected ? 240 : 120);
        }
      }

      logMapRender(`markerCreatedCount = ${markerCreatedCount}`);
      logMapRender(`layerAttached = ${markerIndex.size > 0}`);
    }

    function applyState(message) {
      if (!mapReady || !message || message.type !== "state") {
        return;
      }

      const points = Array.isArray(message.points) ? message.points : [];
      const currentToken = ++renderToken;
      setTheme(message.theme);

      const batches = prepareRenderBatches(points);
      const finalizeRender = convertedRenderablePoints => {
        if (currentToken !== renderToken) {
          return;
        }

        const finalRenderablePoints = batches.directRenderablePoints.concat(convertedRenderablePoints);
        logMapRender(`finalRenderablePointCount = ${finalRenderablePoints.length}`);
        syncMarkers(finalRenderablePoints);

        const pointSignature = buildPointSignature(finalRenderablePoints);
        if (pointSignature !== lastPointSignature) {
          lastPointSignature = pointSignature;
          fitOrFocus(finalRenderablePoints, message.selectedPointId);
          return;
        }

        if (message.selectedPointId) {
          fitOrFocus(finalRenderablePoints, message.selectedPointId);
        }
      };

      if (batches.baiduConvertiblePoints.length === 0) {
        logMapRender("convertedPointCount = 0");
        finalizeRender([]);
        return;
      }

      convertBaiduBatch(batches.baiduConvertiblePoints).then(finalizeRender);
    }

    function loadAmap() {
      return new Promise((resolve, reject) => {
        if (window.AMap) {
          resolve();
          return;
        }

        if (!bootConfig.apiKey || !bootConfig.securityJsCode) {
          reject(new Error("map_config_missing"));
          return;
        }

        window._AMapSecurityConfig = { securityJsCode: bootConfig.securityJsCode };

        const script = document.createElement("script");
        script.src = `https://webapi.amap.com/maps?v=${encodeURIComponent(bootConfig.apiVersion)}&key=${encodeURIComponent(bootConfig.apiKey)}`;
        script.async = true;
        script.onerror = () => reject(new Error("amap_script_failed"));
        script.onload = () => {
          if (window.AMap) {
            resolve();
            return;
          }

          reject(new Error("amap_runtime_missing"));
        };

        document.head.appendChild(script);

        window.setTimeout(() => {
          if (!window.AMap) {
            reject(new Error("amap_script_timeout"));
          }
        }, 9000);
      });
    }

    function initMap() {
      map = new AMap.Map("map", {
        zoom: bootConfig.defaultZoom,
        center: [bootConfig.defaultCenterLongitude, bootConfig.defaultCenterLatitude],
        viewMode: "3D",
        mapStyle: "amap://styles/normal"
      });

      const completeReady = () => {
        if (mapReadyPosted) {
          return;
        }

        mapReadyPosted = true;
        mapReady = true;
        document.body.classList.add("map-ready");
        post("ready", { message: "map_ready" });
      };

      map.on("complete", completeReady);
      window.setTimeout(completeReady, 1200);
    }

    window.chrome.webview.addEventListener("message", event => {
      try {
        applyState(event.data);
      } catch (error) {
        post("error", error && error.message ? error.message : "map_state_apply_failed");
      }
    });

    loadAmap()
      .then(initMap)
      .catch(error => {
        post("error", error && error.message ? error.message : "amap_init_failed");
      });
  </script>
</body>
</html>
